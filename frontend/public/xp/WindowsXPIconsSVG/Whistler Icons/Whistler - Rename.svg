<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <image x="320" y="72" width="336" height="841" id="image" href="data:image/webp;base64," />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="10.4" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="14.8" />
      <feOffset dx="19.4" dy="21.55" result="SHADOW" />
      <feFlood flood-color="#010202" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <linearGradient id="gradient" x2="100%" y2="0%" gradientTransform="translate(-0.19,-0.12) translate(0.5,0.5) scale(1 0.3995) rotate(-90) scale(0.73 1) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#a4a3fc" stop-opacity="100%" />
      <stop offset="99%" stop-color="#f8f7fe" stop-opacity="100%" />
      <stop offset="100%" stop-color="#f8f7fe" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="336" height="841" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="dilate" radius="12" in="SourceAlpha" result="DILATED" />
      <feMorphology operator="erode" radius="12" in="SourceAlpha" result="ERODED" />
      <feComposite operator="xor" in="DILATED" in2="ERODED" result="STROKEAREA" />
      <feFlood flood-color="#2d2c2d" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
    <text text-anchor="middle" font-size="770.83" font-family="Trebuchet MS" fill="#5885d7" letter-spacing="134.9" x="502.64" y="765.34" id="text" font-weight="700">ae</text>
    <radialGradient id="gradient_2" x2="0%" y2="100%" gradientTransform="translate(-0.07,-0.41) translate(0.5,0.5) scale(0.4431 1) rotate(-113) scale(1 0.77) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#99c6fc" stop-opacity="100%" />
      <stop offset="1%" stop-color="#99c6fc" stop-opacity="100%" />
      <stop offset="100%" stop-color="#4e8bfb" stop-opacity="100%" />
    </radialGradient>
    <rect id="gradientfill_2" width="100%" height="100%" fill="url(#gradient_2)" />
    <filter id="gradientoverlay_2" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill_2" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke_2">
      <feMorphology operator="dilate" radius="21" in="SourceAlpha" />
      <feComposite operator="xor" in2="SourceAlpha" result="STROKEAREA" />
      <feFlood flood-color="#2d3748" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
  </defs>
  <use href="#image" filter="url(#dropshadow)" />
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#stroke)" />
  <use href="#text" filter="url(#dropshadow)" />
  <use href="#text" />
  <use href="#text" filter="url(#gradientoverlay_2)" />
  <use href="#text" filter="url(#stroke_2)" />
</svg>
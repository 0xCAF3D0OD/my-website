<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <image x="65" y="117" width="898" height="931" id="image" href="data:image/webp;base64," />
    <linearGradient id="gradient" x2="100%" y2="0%" gradientTransform="translate(-0.25,-0.34) translate(0.5,0.5) scale(1 0.9646) rotate(43) scale(0.5 1) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#8fc6fc" stop-opacity="100%" />
      <stop offset="100%" stop-color="#3255c1" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="898" height="931" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="dilate" radius="13.5" in="SourceAlpha" result="DILATED" />
      <feMorphology operator="erode" radius="13.5" in="SourceAlpha" result="ERODED" />
      <feComposite operator="xor" in="DILATED" in2="ERODED" result="STROKEAREA" />
      <feFlood flood-color="#233a9b" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
  </defs>
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#stroke)" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <rect x="31" y="258" width="910" height="473" id="shape" />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="14.7" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="17.15" />
      <feOffset dx="12.71" dy="14.12" result="SHADOW" />
      <feFlood flood-color="#000000" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <image x="574" y="76" width="336" height="841" id="image" href="data:image/webp;base64," />
    <linearGradient id="gradient" x2="100%" y2="0%" gradientTransform="translate(-0.19,-0.12) translate(0.5,0.5) scale(1 0.3995) rotate(-90) scale(0.73 1) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#a5a5ff" stop-opacity="100%" />
      <stop offset="99%" stop-color="#f9f7ff" stop-opacity="100%" />
      <stop offset="100%" stop-color="#f9f7ff" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="336" height="841" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="dilate" radius="12" in="SourceAlpha" result="DILATED" />
      <feMorphology operator="erode" radius="12" in="SourceAlpha" result="ERODED" />
      <feComposite operator="xor" in="DILATED" in2="ERODED" result="STROKEAREA" />
      <feFlood flood-color="#292729" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
  </defs>
  <use href="#shape" filter="url(#dropshadow)" opacity="0.68" />
  <use href="#shape" fill="#ffffff" />
  <use href="#shape" fill="none" stroke-width="23.79" stroke="#000000" />
  <rect x="93" y="323" width="545" height="347" fill="#0335b1" />
  <use href="#image" filter="url(#dropshadow)" opacity="0.68" />
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#stroke)" />
</svg>
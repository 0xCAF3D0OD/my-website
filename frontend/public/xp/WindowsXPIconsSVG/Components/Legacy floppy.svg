<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <image x="58" y="51" width="913" height="913" id="image" href="data:image/webp;base64," />
    <linearGradient id="gradient" x2="0%" y2="100%" gradientTransform="translate(-0.03,-0.1) translate(0.5,0.5) rotate(-23) scale(1 1.5) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#28282d" stop-opacity="100%" />
      <stop offset="0%" stop-color="#28282d" stop-opacity="100%" />
      <stop offset="100%" stop-color="#8d8df4" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="913" height="913" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="erode" radius="21" in="SourceAlpha" />
      <feComposite operator="xor" in2="SourceAlpha" result="STROKEAREA" />
      <feImage href="#gradientstroke" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
    <linearGradient id="gradient_2" x2="0%" y2="100%" gradientTransform="rotate(-180)" transform-origin="0.5 0.5">
      <stop offset="0%" stop-color="#3d3e70" stop-opacity="100%" />
      <stop offset="100%" stop-color="#2b284d" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientstroke" width="100%" height="100%" fill="url(#gradient_2)" />
    <circle cx="515" cy="510" r="119.5" id="shape" fill="none" stroke-width="23.79" stroke="#51534d" />
    <filter id="innershadow">
      <feMorphology operator="erode" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="4" />
      <feOffset dx="1.75" dy="3.6" result="SHADOW" />
      <feFlood flood-color="#090909" />
      <feComposite operator="out" in2="SHADOW" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
    <rect x="474" y="686" width="76" height="227" rx="38" ry="38" id="shape_2" />
    <circle cx="689" cy="499" r="22.5" id="shape_3" />
  </defs>
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#stroke)" />
  <use href="#shape" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.35" />
  <use href="#shape" fill="none" stroke-width="23.79" stroke="#51534d" />
  <use href="#shape_2" fill="#51534d" />
  <use href="#shape_2" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.35" />
  <use href="#shape_3" fill="#51534d" />
  <use href="#shape_3" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.35" />
  <rect x="127" y="94" width="777" height="239" rx="10" ry="10" fill="#ffffff" />
  <rect x="166" y="271" width="699" height="26" fill="#c9c9c9" />
  <rect x="166" y="201" width="699" height="26" fill="#c9c9c9" />
  <rect x="166" y="131" width="699" height="26" fill="#c9c9c9" />
</svg>
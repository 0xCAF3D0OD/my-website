<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <circle cx="494" cy="498" r="477.5" id="shape" />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="6.3" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="7.35" />
      <feOffset dx="9.44" dy="11.66" result="SHADOW" />
      <feFlood flood-color="#000000" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <filter id="innershadow">
      <feMorphology operator="erode" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="19" />
      <feOffset dx="-18.7" dy="-18.06" result="SHADOW" />
      <feFlood flood-color="#010202" />
      <feComposite operator="out" in2="SHADOW" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
    <circle cx="492" cy="497" r="363.5" id="shape_2" />
    <text text-anchor="middle" font-size="770.83" font-family="Avenir" fill="#ffffff" letter-spacing="-19.27" x="478.54" y="785.77" id="text" font-weight="700">?</text>
    <filter id="coloroverlay">
      <feFlood flood-color="#001b7f" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
    <filter id="innershadow_3">
      <feMorphology operator="erode" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="9" />
      <feOffset dx="8.24" dy="13.71" result="SHADOW" />
      <feFlood flood-color="#010202" />
      <feComposite operator="out" in2="SHADOW" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
  </defs>
  <use href="#shape" filter="url(#dropshadow)" opacity="0.67" />
  <use href="#shape" fill="#ffffff" />
  <use href="#shape" fill="#03257d" />
  <use href="#shape" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.1" />
  <use href="#shape_2" fill="#ffffff" />
  <use href="#shape_2" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.25" />
  <use href="#text" />
  <use href="#text" filter="url(#coloroverlay)" />
  <use href="#text" filter="url(#innershadow_3)" style="mix-blend-mode: multiply" opacity="0.25" />
</svg>
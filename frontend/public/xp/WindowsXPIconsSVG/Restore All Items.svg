<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <image x="202" y="92" width="620" height="840" id="image" href="data:image/webp;base64," />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="16.17" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="16.42" />
      <feOffset dx="22.16" dy="28.37" result="SHADOW" />
      <feFlood flood-color="#000000" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <linearGradient id="gradient" x2="100%" y2="0%" gradientTransform="translate(-0.2,-0.05) translate(0.5,0.5) scale(1 0.7381) rotate(80) scale(0.5 1) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#19ab09" stop-opacity="100%" />
      <stop offset="1%" stop-color="#19ab09" stop-opacity="100%" />
      <stop offset="100%" stop-color="#87ed55" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="620" height="840" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="dilate" radius="32" in="SourceAlpha" />
      <feComposite operator="xor" in2="SourceAlpha" result="STROKEAREA" />
      <feImage href="#gradientstroke" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
    <linearGradient id="gradient_2" x2="100%" y2="0%" gradientTransform="scale(1 0.7381) rotate(-104) scale(0.41 1)" transform-origin="0.5 0.5">
      <stop offset="0%" stop-color="#016f01" stop-opacity="100%" />
      <stop offset="99%" stop-color="#018301" stop-opacity="100%" />
      <stop offset="100%" stop-color="#018301" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientstroke" width="100%" height="100%" fill="url(#gradient_2)" />
  </defs>
  <use href="#image" filter="url(#dropshadow)" />
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#stroke)" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <mask id="mask">
      <rect x="169" y="288" width="588" height="36" fill="#ffffff" />
      <rect x="169" y="363" width="588" height="36" fill="#ffffff" />
      <rect x="169" y="438" width="588" height="36" fill="#ffffff" />
      <rect x="169" y="513" width="588" height="36" fill="#ffffff" />
      <rect x="169" y="588" width="588" height="36" fill="#ffffff" />
      <rect x="169" y="663" width="588" height="36" fill="#ffffff" />
    </mask>
    <image x="105" y="92" width="882" height="755" id="image" href="data:image/webp;base64," />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="8.7" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="10.15" />
      <feOffset dx="-0" dy="9" result="SHADOW" />
      <feFlood flood-color="#000000" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <linearGradient id="gradient" x2="0%" y2="100%" gradientTransform="translate(-0.14,0.2) translate(0.5,0.5) scale(0.856 1) scale(1 0.79) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#435bc1" stop-opacity="100%" />
      <stop offset="100%" stop-color="#5f83cf" stop-opacity="100%" />
    </linearGradient>
    <rect id="gradientfill" width="882" height="755" fill="url(#gradient)" />
    <filter id="gradientoverlay" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feImage href="#gradientfill" />
      <feComposite in2="SourceAlpha" operator="in" />
    </filter>
    <filter id="innershadow">
      <feMorphology operator="erode" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="0" />
      <feOffset dx="-0" dy="35" result="SHADOW" />
      <feFlood flood-color="#6f93fb" />
      <feComposite operator="out" in2="SHADOW" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
    <rect x="133" y="222" width="827" height="602" rx="30" ry="30" id="shape" />
    <linearGradient id="gradient_2" x2="0%" y2="100%" gradientTransform="translate(-0.14,0.2) translate(0.5,0.5) scale(0.7277 1) scale(1 0.79) translate(-0.5,-0.5)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="100%" />
      <stop offset="99%" stop-color="#cddff3" stop-opacity="100%" />
      <stop offset="100%" stop-color="#cddff3" stop-opacity="100%" />
    </linearGradient>
    <linearGradient id="gradient_3" x2="0%" y2="100%" gradientTransform="scale(0.7017 1) rotate(-270)" transform-origin="0.5 0.5">
      <stop offset="0%" stop-color="#a7c5e9" stop-opacity="100%" />
      <stop offset="100%" stop-color="#a9c5e9" stop-opacity="100%" />
    </linearGradient>
  </defs>
  <use href="#image" filter="url(#dropshadow)" opacity="0.74" />
  <use href="#image" />
  <use href="#image" filter="url(#gradientoverlay)" />
  <use href="#image" filter="url(#innershadow)" />
  <use href="#shape" fill="#ffffff" />
  <use href="#shape" fill="url(#gradient_2)" />
  <rect x="168" y="286" width="590" height="414" mask="url(#mask)" fill="url(#gradient_3)" />
  <text text-anchor="middle" font-size="578.62" font-family="Arial Rounded MT" fill="#d38920" letter-spacing="-8.68" transform-origin="860.9 700.78" x="860.9" y="700.78" transform="scale(0.95,1)" font-weight="700">!</text>

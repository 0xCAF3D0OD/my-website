<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <image x="40" y="37" width="944" height="944" id="image" href="data:image/webp;base64," />
    <filter id="dropshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="0" />
      <feOffset dx="28.77" dy="27.79" result="SHADOW" />
      <feFlood flood-color="#6f6f6f" />
      <feComposite operator="in" in2="SHADOW" />
    </filter>
    <filter id="stroke">
      <feMorphology operator="erode" radius="29" in="SourceAlpha" />
      <feComposite operator="xor" in2="SourceAlpha" result="STROKEAREA" />
      <feFlood flood-color="#8f8f8f" />
      <feComposite operator="in" in2="STROKEAREA" />
    </filter>
  </defs>
  <use href="#image" filter="url(#dropshadow)" style="mix-blend-mode: multiply" />
  <use href="#image" />
  <use href="#image" filter="url(#stroke)" />
</svg>
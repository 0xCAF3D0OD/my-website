<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <text text-anchor="middle" font-size="833.33" font-family="Avenir" fill="#ffffff" letter-spacing="-20.83" x="503.54" y="814.77" id="text" font-weight="700">?</text>
    <filter id="coloroverlay">
      <feFlood flood-color="#12207b" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
    <filter id="innershadow">
      <feMorphology operator="erode" radius="0" in="SourceAlpha" />
      <feGaussianBlur stdDeviation="9" />
      <feOffset dx="8.24" dy="13.71" result="SHADOW" />
      <feFlood flood-color="#080808" />
      <feComposite operator="out" in2="SHADOW" />
      <feComposite operator="in" in2="SourceAlpha" />
    </filter>
  </defs>
  <image id="image" x="126" y="0" width="782" height="1024" href="data:image/webp;base64," />
  <use href="#text" />
  <use href="#text" filter="url(#coloroverlay)" />
  <use href="#text" filter="url(#innershadow)" style="mix-blend-mode: multiply" opacity="0.25" />
</svg>